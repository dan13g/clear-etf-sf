name: snowflake_smoke_test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snowflake-smoke-test:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: CPRCYYC-FB19926
      SNOWFLAKE_CI_USER: ${{ secrets.SNOWFLAKE_CI_USER }}
      SNOWFLAKE_CI_ROLE: ${{ secrets.SNOWFLAKE_CI_ROLE }}
      SNOWFLAKE_CI_WAREHOUSE: ${{ secrets.SNOWFLAKE_CI_WAREHOUSE }}
      SNOWFLAKE_CI_DATABASE: ${{ secrets.SNOWFLAKE_CI_DATABASE }}
      SNOWFLAKE_CI_SCHEMA: ${{ secrets.SNOWFLAKE_CI_SCHEMA }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_CI_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_CI_SCHEMA }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_CI_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_CI_WAREHOUSE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        env:
          SNOWFLAKE_CI_USER: ${{ secrets.SNOWFLAKE_CI_USER }}
          SNOWFLAKE_CI_ROLE: ${{ secrets.SNOWFLAKE_CI_ROLE }}
          SNOWFLAKE_CI_WAREHOUSE: ${{ secrets.SNOWFLAKE_CI_WAREHOUSE }}
          SNOWFLAKE_CI_DATABASE: ${{ secrets.SNOWFLAKE_CI_DATABASE }}
          SNOWFLAKE_CI_SCHEMA: ${{ secrets.SNOWFLAKE_CI_SCHEMA }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          for secret_name in SNOWFLAKE_CI_USER SNOWFLAKE_CI_ROLE SNOWFLAKE_CI_WAREHOUSE SNOWFLAKE_CI_DATABASE SNOWFLAKE_CI_SCHEMA SNOWFLAKE_PRIVATE_KEY; do
            if [ -z "${!secret_name}" ]; then
              echo "$secret_name is not configured."
              echo "Add it in GitHub: Settings > Secrets and variables > Actions > New repository secret."
              exit 1
            fi
          done

      - name: Write Snowflake private key
        shell: bash
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          key_path="$RUNNER_TEMP/snowflake_rsa_key.p8"
          printf '%s\n' "$SNOWFLAKE_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "SNOWFLAKE_PRIVATE_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Set optional key passphrase
        shell: bash
        env:
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          if [ -n "$SNOWFLAKE_PRIVATE_KEY_PASSPHRASE" ]; then
            echo "SNOWFLAKE_PRIVATE_KEY_PASSPHRASE=$SNOWFLAKE_PRIVATE_KEY_PASSPHRASE" >> "$GITHUB_ENV"
          fi

      - name: Smoke test Snowflake Python connection
        run: python src/test_snowflake_connection.py

      - name: Create dbt profiles
        shell: bash
        run: |
          mkdir -p "$HOME/.dbt"
          cat > "$HOME/.dbt/profiles.yml" <<'YAML'
          clear_etf_ci:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: CPRCYYC-FB19926
                user: "{{ env_var('SNOWFLAKE_CI_USER') }}"
                private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
                private_key_passphrase: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PASSPHRASE', '') }}"
                role: "{{ env_var('SNOWFLAKE_CI_ROLE') }}"
                database: "{{ env_var('SNOWFLAKE_CI_DATABASE') }}"
                schema: "{{ env_var('SNOWFLAKE_CI_SCHEMA') }}"
                warehouse: "{{ env_var('SNOWFLAKE_CI_WAREHOUSE') }}"
                threads: 10
                reuse_connections: True
          YAML

      - name: Run dbt debug
        working-directory: dbt
        run: dbt debug --profile clear_etf_ci
