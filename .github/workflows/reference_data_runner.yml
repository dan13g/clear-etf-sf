name: reference_data_runner

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reference-data-runner:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate MotherDuck token
        shell: bash
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          if [ -z "$MOTHERDUCK_TOKEN" ]; then
            echo "MOTHERDUCK_TOKEN is not configured."
            echo "Add it in GitHub: Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi

      - name: Load asset master
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python src/load_asset_master.py

      - name: Load ETF metadata workbook
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python src/load_etf_metadata.py

      - name: Create dbt profile
        shell: bash
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          mkdir -p "$HOME/.dbt"
          cat > "$HOME/.dbt/profiles.yml" <<'YAML'
          dbt:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: "md:market_intel"
                token: "{{ env_var('MOTHERDUCK_TOKEN') }}"
                threads: 4
          YAML

      - name: Run dbt
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          dbt debug
          dbt deps
          dbt run
