name: daily_runner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * 0"

permissions:
  contents: read

jobs:
  daily-prices-runner:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: FB19926.eu-west-2.aws
      SNOWFLAKE_USER: bgheoca
      SNOWFLAKE_ROLE: clearetf_role
      SNOWFLAKE_WAREHOUSE: clearetf_wh
      SNOWFLAKE_DATABASE: clearetf_db
      SNOWFLAKE_SCHEMA: RAW
      SNOWFLAKE_AUTHENTICATOR: username_password_mfa

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          ETF_METADATA_GOOGLE_SHEET: ${{ secrets.ETF_METADATA_GOOGLE_SHEET }}
        run: |
          if [ -z "$SNOWFLAKE_PASSWORD" ]; then
            echo "SNOWFLAKE_PASSWORD is not configured."
            echo "Add it in GitHub: Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi
          if [ -z "$ETF_METADATA_GOOGLE_SHEET" ]; then
            echo "ETF_METADATA_GOOGLE_SHEET is not configured."
            echo "Add it in GitHub: Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi

      - name: Load asset master
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: python src/load_asset_master.py

      - name: Run daily price loader
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: python src/load_daily_prices.py

      - name: Load ETF metadata from Google Sheets
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          ETF_METADATA_GOOGLE_SHEET: ${{ secrets.ETF_METADATA_GOOGLE_SHEET }}
        run: python src/load_etf_metadata.py

      - name: Create dbt profile
        shell: bash
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p "$HOME/.dbt"
          cat > "$HOME/.dbt/profiles.yml" <<'YAML'
          clear_etf:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: FB19926.eu-west-2.aws
                user: bgheoca
                password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
                authenticator: username_password_mfa
                role: clearetf_role
                database: clearetf_db
                schema: RAW
                warehouse: clearetf_wh
                threads: 10
                reuse_connections: True
          YAML

      - name: Run dbt
        working-directory: dbt
        env:
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          dbt debug --profile clear_etf
          dbt deps
          dbt run --profile clear_etf
