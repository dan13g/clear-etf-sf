name: daily_runner

on:
  workflow_dispatch:
  schedule:
    # Run at 22:00 UTC/GMT every Sunday.
    - cron: "0 22 * * 0"

permissions:
  contents: read

jobs:
  daily-prices-runner:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          ETF_METADATA_GOOGLE_SHEET: ${{ secrets.ETF_METADATA_GOOGLE_SHEET }}
        run: |
          if [ -z "$MOTHERDUCK_TOKEN" ]; then
            echo "MOTHERDUCK_TOKEN is not configured."
            echo "Add it in GitHub: Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi
          if [ -z "$ETF_METADATA_GOOGLE_SHEET" ]; then
            echo "ETF_METADATA_GOOGLE_SHEET is not configured."
            echo "Add it in GitHub: Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi

      - name: Load asset master
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python src/load_asset_master.py

      - name: Run daily price loader
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python src/load_daily_prices.py

      - name: Load ETF metadata from Google Sheets
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          ETF_METADATA_GOOGLE_SHEET: ${{ secrets.ETF_METADATA_GOOGLE_SHEET }}
        run: python src/load_etf_metadata.py

      - name: Create dbt profile
        shell: bash
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          mkdir -p "$HOME/.dbt"
          cat > "$HOME/.dbt/profiles.yml" <<'YAML'
          clear_etf:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: "md:clear_etf"
                token: "{{ env_var('MOTHERDUCK_TOKEN') }}"
                threads: 4
          YAML
          echo "Generated profiles.yml:"
          cat "$HOME/.dbt/profiles.yml"

      - name: Run dbt
        working-directory: dbt
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          dbt debug --profile clear_etf
          dbt deps
          dbt run --profile clear_etf
