version: 2

sources:
  - name: motherduck_raw
    description: Raw tables loaded into MotherDuck by the Python ingestion scripts.
    schema: raw
    tables:
      - name: asset_master
        description: Tracked asset master config loaded from the curated CSV file.
      - name: asset_prices_yfinance
        description: Daily market prices for tracked assets ingested from yfinance.
      - name: etf_metadata
        description: ETF reference metadata loaded from the Market Intel workbook.
      - name: etf_geography
        description: Latest ETF geography exposure weights loaded from the workbook.
      - name: etf_sector
        description: Latest ETF sector exposure weights loaded from the workbook.
      - name: equivalence_groups
        description: ETF equivalence group definitions loaded from the workbook.
      - name: equivalence_group_relationships
        description: Relationship map between ETF equivalence groups.

models:
  - name: raw_asset_master
    description: Typed passthrough model for the tracked asset master.
    columns:
      - name: ticker
        tests:
          - not_null
          - unique
      - name: asset_type
        tests:
          - not_null
  - name: raw_yfinance
    description: Typed passthrough model for raw yfinance prices.
    columns:
      - name: ticker
        tests:
          - not_null
      - name: trading_date
        tests:
          - not_null
  - name: raw_etf
    description: Typed passthrough model for ETF metadata.
    columns:
      - name: etf_code
        tests:
          - not_null
          - unique
      - name: ticker
        tests:
          - not_null
      - name: equivalence_group_code
        tests:
          - not_null
  - name: raw_geography
    description: Typed passthrough model for ETF geography exposures.
    columns:
      - name: etf_code
        tests:
          - not_null
      - name: geography_name
        tests:
          - not_null
  - name: raw_sector
    description: Typed passthrough model for ETF sector exposures.
    columns:
      - name: etf_code
        tests:
          - not_null
      - name: sector_name
        tests:
          - not_null
  - name: raw_equivalence_groups
    description: Typed passthrough model for equivalence group definitions.
    columns:
      - name: equivalence_group_code
        tests:
          - not_null
          - unique
  - name: raw_equivalence_group_relationships
    description: Typed passthrough model for equivalence group relationship mappings.
    columns:
      - name: source_group_code
        tests:
          - not_null
      - name: target_group_code
        tests:
          - not_null
