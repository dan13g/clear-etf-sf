version: 2

models:
  - name: dim_provider
    description: ETF provider lookup retained for app compatibility.
  - name: dim_index
    description: ETF benchmark lookup retained for app compatibility.
  - name: dim_equivalence_group
    description: ETF equivalence group dimension.
    columns:
      - name: equivalence_group_key
        tests:
          - not_null
          - unique
  - name: dim_etf
    description: ETF compatibility dimension built from the new asset and ETF profile layers.
    columns:
      - name: etf_key
        tests:
          - not_null
          - unique
      - name: ticker
        tests:
          - not_null
          - unique
  - name: dim_geography
    description: Geography lookup for ETF bridge models.
  - name: dim_sector
    description: Sector lookup for ETF bridge models.
  - name: bridge_etf_geography
    description: ETF geography exposure bridge.
  - name: bridge_etf_sector
    description: ETF sector exposure bridge.
  - name: fact_asset_price_daily
    description: Universal price fact at asset by trading date grain.
    columns:
      - name: date_key
        tests:
          - not_null
      - name: asset_key
        tests:
          - not_null
  - name: fact_etf_daily
    description: ETF-only compatibility fact built from the asset-wide metrics layer.
  - name: mart_asset_returns
    description: Asset-wide return mart.
  - name: mart_asset_risk
    description: Asset-wide risk mart.
  - name: mart_asset_trend
    description: Asset-wide trend mart.
  - name: mart_asset_moves
    description: Daily top-mover mart across the tracked universe.
  - name: mart_fx_intelligence
    description: FX-focused intelligence mart.
  - name: mart_market_regime
    description: Daily regime classification mart based on cross-market signals.
  - name: mart_etf_overlap
    description: ETF overlap mart using geography and sector exposures.
  - name: mart_etf_equivalence
    description: ETF equivalence mart comparing products within the same equivalence group.
  - name: mart_fee_benchmarks
    description: ETF TER benchmarking mart by equivalence group.
